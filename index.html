<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les Vacances Étranges</title>

  <!-- Open Graph -->
  <meta property="og:title"       content="Les Vacances Étranges" />
  <meta property="og:description" content="A season for whimsy and dining outdoors." />
  <meta property="og:image"       content="https://strangevacation.vercel.app/og-preview.png" />
  <meta property="og:url"         content="https://strangevacation.vercel.app" />
  <meta property="og:type"        content="website" />

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Les Vacances Étranges" />
  <meta name="twitter:description" content="A season for whimsy and dining outdoors." />
  <meta name="twitter:image"       content="https://strangevacation.vercel.app/og-preview.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --pool:        #7ec8c8;
      --pool-deep:   #4a9fa5;
      --linen:       #f7f3ec;
      --ink:         #1c1a15;
      --ink-mid:     #4a4237;
      --ink-soft:    #9a8f82;
      --rust:        #c4603a;
      --cream:       #fdf9f3;
      --script: 'Great Vibes', cursive;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background: var(--linen);
      color: var(--ink);
      font-family: var(--serif);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero-wrap {
      position: relative;
      width: 100%;
      z-index: 5;
    }
    .hero-wrap img {
      width: 100%;
      display: block;
      object-fit: cover;
    }
    .hero-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, var(--linen));
      pointer-events: none;
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.25rem 5rem;
      margin-top: -5rem;
    }

    /* ── Brand ── */
    .brand-header {
      text-align: center;
      padding: 1.8rem 1rem 0.5rem;
    }
    .brand-script {
      font-family: var(--script);
      font-size: clamp(3rem, 12vw, 5.5rem);
      line-height: 1;
      color: var(--ink);
      display: block;
      margin-bottom: 0.25rem;
      animation: scriptFade 1.2s ease forwards;
    }
    .brand-sub {
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 300;
      animation: scriptFade 1.2s 0.3s ease both;
    }
    @keyframes scriptFade {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .gateway-card {
      background: var(--cream);
      border: 1px solid rgba(180,160,130,0.3);
      box-shadow: 0 12px 48px rgba(28,26,21,0.12), 0 2px 8px rgba(28,26,21,0.06);
      padding: 2.5rem 2rem 2.5rem;
      margin-top: 2rem;
      width: 100%;
      max-width: 560px;
      position: relative;
      animation: riseIn 0.65s var(--ease) forwards;
    }
    .gateway-card::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 0.5px solid rgba(180,160,130,0.2);
      pointer-events: none;
    }

    /* ── Ornament ── */
    .gateway-ornament {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .gateway-ornament svg { width: 48px; height: 48px; }

    /* ── Copy ── */
    .gateway-copy {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--ink-mid);
      font-weight: 300;
      margin-bottom: 1.6rem;
      text-align: center;
    }

    .gateway-prompt {
      font-family: var(--script);
      font-size: clamp(1.7rem, 6vw, 2.4rem);
      color: var(--ink);
      text-align: center;
      margin-bottom: 2rem;
    }

    /* ── Form ── */
    .field-group {
      margin-bottom: 1.5rem;
    }

    .txt-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(155,143,130,0.4);
      padding: 0.5rem 0;
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.3s;
    }
    .txt-input:focus { border-bottom-color: var(--pool-deep); }
    .txt-input::placeholder { color: rgba(155,143,130,0.7); font-style: italic; }

    .gateway-submit {
      text-align: center;
      margin-top: 2.2rem;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 0.8rem 2.4rem;
      background: transparent;
      border: 1px solid var(--ink);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    .btn:hover { background: var(--ink); color: var(--linen); }
    .btn-teal { border-color: var(--pool-deep); color: var(--pool-deep); }
    .btn-teal:hover { background: var(--pool-deep); color: white; }
    .btn:disabled { opacity: 0.5; cursor: default; pointer-events: none; }

    .submit-spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(75,159,165,0.3);
      border-top-color: var(--pool-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .submit-error {
      font-size: 0.78rem;
      color: var(--rust);
      font-style: italic;
      margin-top: 0.9rem;
      display: none;
    }
    .submit-error.show { display: block; }

    /* ── Success ── */
    .gateway-success-script {
      font-family: var(--script);
      font-size: clamp(1.9rem, 8vw, 3rem);
      color: var(--ink);
      text-align: center;
      display: block;
      margin-bottom: 1rem;
    }
    .gateway-success-body {
      font-size: 0.9rem;
      color: var(--ink-mid);
      font-style: italic;
      line-height: 1.9;
      font-weight: 300;
      text-align: center;
    }

    /* ── Footer ── */
    .page-footer {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0 0;
      margin-top: 2rem;
      border-top: 0.5px solid rgba(155,143,130,0.3);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    @media (min-width: 768px) {
      .app { margin-top: -12rem; }
    }
    @media (max-width: 480px) {
      .gateway-card { padding: 1.8rem 1.3rem 2rem; }
    }
  </style>
</head>
<body>

  <div class="hero-wrap"><img src="hero.png" alt="Les Vacances Étranges" /></div>

  <main class="app">

    <header class="brand-header">
      <span class="brand-script">Les Vacances Étranges</span>
      <div class="brand-sub">Toronto &ensp;·&ensp; Summer 2026</div>
    </header>

    <!-- Form state -->
    <div class="gateway-card" id="formCard">
      <div class="gateway-ornament">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="20" stroke="#b8ad9e" stroke-width="0.5"/>
          <circle cx="24" cy="24" r="14" stroke="#b8ad9e" stroke-width="0.3" stroke-dasharray="2 3.5"/>
          <circle cx="24" cy="24" r="3.5" fill="#c4603a" opacity="0.5"/>
        </svg>
      </div>

      <p class="gateway-copy">
        Summer is officially upon us — a season for whimsy<br>and dining outdoors.
      </p>

      <p class="gateway-prompt">Want to go down the rabbit hole?</p>

      <form id="rabbitForm">
        <div class="field-group">
          <input class="txt-input" type="text" id="inputAnswer"
            placeholder="your answer" autocomplete="off" />
        </div>
        <div class="field-group">
          <input class="txt-input" type="text" id="inputName"
            placeholder="your name" autocomplete="given-name" />
        </div>
        <div class="field-group">
          <input class="txt-input" type="text" id="inputContact"
            placeholder="where can we find you? (email or @handle)" autocomplete="email" />
        </div>

        <div class="gateway-submit">
          <button type="submit" class="btn btn-teal" id="submitBtn">
            <span id="submitLabel">Enter &nbsp;→</span><span class="submit-spinner" id="submitSpinner"></span>
          </button>
          <div class="submit-error" id="submitError">Something went wrong — please try again.</div>
        </div>
      </form>
    </div>

    <!-- Success state -->
    <div class="gateway-card" id="successCard" style="display:none;">
      <span class="gateway-success-script">Noted.</span>
      <p class="gateway-success-body">The rabbit hole remembers you.</p>
    </div>

    <footer class="page-footer">
      <span>Vacances Étranges</span>
      <span>Toronto, CA</span>
    </footer>

  </main>

  <script>
    const form    = document.getElementById('rabbitForm');
    const btn     = document.getElementById('submitBtn');
    const spinner = document.getElementById('submitSpinner');
    const errEl   = document.getElementById('submitError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('show');

      const answer  = document.getElementById('inputAnswer').value.trim();
      const name    = document.getElementById('inputName').value.trim();
      const contact = document.getElementById('inputContact').value.trim();

      btn.disabled          = true;
      spinner.style.display = 'inline-block';

      try {
        const res = await fetch('/api/rabbithole', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            answer,
            name,
            contact,
            submittedAt: new Date().toISOString(),
          }),
        });

        if (!res.ok) throw new Error('non-2xx');

        document.getElementById('formCard').style.display   = 'none';
        document.getElementById('successCard').style.display = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch {
        btn.disabled          = false;
        spinner.style.display = 'none';
        errEl.classList.add('show');
      }
    });
  </script>

</body>
</html>
